services:
  authdb:
    image: postgres:16
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: authdb
    ports:
      - "5433:5432"
    volumes:
      - authdb_data:/var/lib/postgresql/data

  parkingdb:
    image: postgres:16
    environment:
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
      POSTGRES_DB: parkingdb
    ports:
      - "5435:5432"
    volumes:
      - parkingdb_data:/var/lib/postgresql/data

  mailer-service:
    build:
      context: ./mailer-service # <- carpeta al lado del compose
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8083"
    ports:
      - "8083:8083"

  auth-service:
    build:
      context: ./auth-service       # <- carpeta al lado del compose
      dockerfile: Dockerfile
    environment:
      APP_JWT_SECRET: ${APP_JWT_SECRET}   # viene del .env (recuerda $$ para $)
      DB_URL: jdbc:postgresql://authdb:5432/authdb
      DB_USER: auth
      DB_PASS: auth
    depends_on:
      - authdb
    ports:
      - "8080:8080"

  parking-service:
    build:
      context: ./parking-service    # <- carpeta al lado del compose
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://parkingdb:5432/parkingdb
      DB_USER: parking
      DB_PASS: parking
      # (opcional, si tu servicio llama al auth)
      # AUTH_BASE_URL: http://auth-service:8080
    depends_on:
      - parkingdb
      - auth-service
    ports:
      - "8081:8081"

volumes:
  authdb_data:
  parkingdb_data:
