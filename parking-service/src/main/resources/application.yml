server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
spring:
  application:
    name: parking-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/parkingdb}
    username: ${DB_USER:parking}
    password: ${DB_PASSWORD:parking}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # usamos Flyway, aquí solo validar
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# El mismo secreto que usa auth-service para firmar, para poder validar aquí
app:
  jwt:
    secret: ${APP_JWT_SECRET:p2P!Q7vH9mR@t5Zk1LwX8sC#bF&gN3yV*eU4oI6qD%jM7rA$hK2nO5wE8uT0lY!zB}

mailer:
  base-url: ${MAILER_BASE_URL:http://localhost:8083}

